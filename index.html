<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMDigiCorp</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
}

.hero{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:
radial-gradient(circle at center,
rgba(0,119,255,0.20) 0%,
#001233 40%,
#000 80%);
overflow:hidden;
}

.hero::before{
content:'';
position:absolute;
width:800px;
height:800px;
background:radial-gradient(circle,
rgba(0,140,255,0.20),
transparent 70%);
filter:blur(100px);
}

.container{
position:relative;
z-index:2;
width:100%;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

/* PROFILE IMAGE */

.profile{
width:220px;
height:220px;
border-radius:50%;
overflow:hidden;
border:5px solid #00aaff;
box-shadow:
0 0 20px #00aaff,
0 0 60px rgba(0,140,255,0.5);
margin-bottom:-40px;
z-index:5;
background:#000;
animation:float 4s ease-in-out infinite;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

/* LOGO */

.logo{
width:100%;
max-width:850px;
display:block;
filter:
drop-shadow(0 0 15px #008cff)
drop-shadow(0 0 50px rgba(0,140,255,0.5));
animation:float2 5s ease-in-out infinite;
}

/* TEXT */

.tagline{
margin-top:35px;
font-size:24px;
letter-spacing:8px;
font-weight:300;
line-height:1.8;
color:#f5f5f5;
}

.highlight{
color:#00aaff;
font-weight:700;
}

.coming{
margin-top:30px;
font-size:60px;
font-weight:700;
letter-spacing:10px;
background:linear-gradient(to bottom,#ffffff,#bfbfbf);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:
0 0 10px rgba(0,140,255,0.4),
0 0 30px rgba(0,140,255,0.5);
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:40px;
padding:18px 50px;
border-radius:60px;
text-decoration:none;
font-size:22px;
font-weight:600;
color:white;
background:linear-gradient(90deg,#00aaff,#0044ff);
box-shadow:
0 0 20px rgba(0,140,255,0.5),
0 0 40px rgba(0,140,255,0.3);
transition:0.4s;
}

.btn:hover{
transform:scale(1.08);
}

/* FOOTER */

footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:15px;
color:#9ca3af;
}

/* ANIMATION */

@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0px);
}
}

@keyframes float2{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(8px);
}
100%{
transform:translateY(0px);
}
}

/* MOBILE */

@media(max-width:768px){

.profile{
width:170px;
height:170px;
margin-bottom:-25px;
}

.logo{
max-width:95%;
}

.tagline{
font-size:18px;
letter-spacing:4px;
}

.coming{
font-size:40px;
letter-spacing:5px;
}

.btn{
font-size:18px;
padding:15px 35px;
}

footer{
font-size:12px;
padding:0 10px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="container">

<!-- PROFILE PHOTO -->

<div class="profile">
<img src="./69406.png" alt="Founder">
</div>

<!-- LOGO -->

<img src="./69409.png" class="logo" alt="GMDigiCorp Logo">

<!-- TAGLINE -->

<div class="tagline">
DIGITAL <span class="highlight">REVOLUTION</span><br>
STARTS HERE
</div>

<!-- COMING SOON -->

<div class="coming">
COMING SOON
</div>

<!-- BUTTON -->

<a href="mailto:gmdigicorp@gmail.com" class="btn">
Contact Us
</a>

</div>

<footer>
© 2026 GMDigiCorp • Innovating the Digital Future
</footer>

</section>

</body>
</html>
