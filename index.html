<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMDigiCorp - Building The Future of IT Technology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #020c1b;
    color: #ffffff;
    overflow-x: hidden;
    min-height: 100vh;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at top, #0a2a4a 0%, #061829 40%, #020c1b 70%, #010508 100%);
    z-index: -3;
}

.bg-layer {
    position: fixed;
    inset: 0;
    z-index: -2;
    overflow: hidden;
}

#network {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.4;
}

.particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

.particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #00eaff;
    border-radius: 50%;
    box-shadow: 0 0 6px #00eaff, 0 0 12px #00aaff;
    opacity: 0.5;
    animation: floatParticle linear infinite;
}

@keyframes floatParticle {
    from { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    to { transform: translateY(-100px) translateX(100px); opacity: 0; }
}

.skyline-wrap {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 320px;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
}

.skyline-img {
    position: absolute;
    bottom: -320px;
    left: 50%;
    transform: translateX(-50%);
    width: 1400px;
    max-width: 180%;
    height: auto;
    opacity: 0.09;
    filter: grayscale(1) brightness(0.2) contrast(1.8) blur(0.5px);
    object-fit: cover;
    object-position: center 68%;
}

.drone {
    position: absolute;
    bottom: 140px;
    right: 8%;
    width: 48px;
    height: 24px;
    opacity: 0.7;
    filter: drop-shadow(0 0 8px #00eaff);
    animation: droneDrift 12s ease-in-out infinite;
    z-index: 2;
}

@keyframes droneDrift {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(-80px) translateY(-8px); }
    50% { transform: translateX(-160px) translateY(2px); }
    75% { transform: translateX(-90px) translateY(8px); }
}

nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5%;
    background: rgba(2, 12, 27, 0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(0, 234, 255, 0.1);
    z-index: 100;
}

.logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: baseline;
}

.logo .gm, .logo .corp {
    color: #ffffff;
}

.logo .digi {
    background: linear-gradient(90deg, #00aaff 0%, #00eaff 50%, #00aaff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(0, 170, 255, 0.5));
}

.nav-menu {
    display: flex;
    gap: 38px;
    list-style: none;
    align-items: center;
}

.nav-menu a {
    color: #9fb3c8;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    padding: 8px 0;
}

.nav-menu a:hover {
    color: #ffffff;
    text-shadow: 0 0 10px rgba(0, 234, 255, 0.8);
}

.nav-menu a.active {
    color: #ffffff;
}

.nav-menu a.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, #00aaff, #00eaff);
    box-shadow: 0 0 10px #00eaff, 0 0 20px #00aaff;
    border-radius: 2px;
}

.hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    background: none;
    border: none;
}

.hamburger span {
    width: 24px;
    height: 2px;
    background: #00eaff;
    border-radius: 2px;
    transition: 0.3s;
    box-shadow: 0 0 6px #00eaff;
}

.hero {
    padding: 150px 5% 140px;
    text-align: center;
    position: relative;
    z-index: 10;
    max-width: 1400px;
    margin: 0 auto;
}

.hero h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 4vw, 3rem);
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.2;
    margin-bottom: 18px;
    min-height: 1.2em;
    color: #ffffff;
    text-shadow: 
        0 0 20px rgba(0, 234, 255, 0.6),
        0 0 40px rgba(0, 170, 255, 0.4),
        0 2px 4px rgba(0, 0, 0, 0.8);
}

.hero h1::after {
    content: '|';
    animation: blink 1s infinite;
    margin-left: 4px;
    color: #00eaff;
}

@keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
}

.subtitle {
    font-size: clamp(0.95rem, 1.6vw, 1.15rem);
    color: #a3b8cc;
    font-weight: 300;
    letter-spacing: 0.5px;
    margin-bottom: 28px;
}

.brand-large {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2.8rem, 9vw, 6.5rem);
    letter-spacing: 2px;
    margin: 10px 0 60px;
    background: linear-gradient(90deg, 
        #d4efff 0%, 
        #ffffff 15%, 
        #89d4ff 30%, 
        #00aaff 45%, 
        #00eaff 50%, 
        #00aaff 55%, 
        #89d4ff 70%, 
        #ffffff 85%, 
        #d4efff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0, 170, 255, 0.6)) drop-shadow(0 0 60px rgba(0, 234, 255, 0.3));
    animation: shimmer 4s linear infinite;
    position: relative;
}

@keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
}

.center-stage {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 60px;
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
}

.side-icons {
    display: flex;
    flex-direction: column;
    gap: 52px;
}

.side-icons.left {
    align-items: flex-end;
    justify-self: end;
}

.side-icons.right {
    align-items: flex-start;
    justify-self: start;
}

.icon-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transform: translateY(24px);
    transition: all 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
    cursor: default;
}

.icon-item.visible {
    opacity: 1;
    transform: translateY(0);
}

.icon-item {
    animation: floatItem 4s ease-in-out infinite alternate;
    animation-delay: var(--delay, 0s);
}

@keyframes floatItem {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
}

.icon-box {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(3, 25, 45, 0.6);
    border: 1.5px solid rgba(0, 234, 255, 0.35);
    border-radius: 16px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 
        inset 0 0 20px rgba(0, 234, 255, 0.1),
        0 0 20px rgba(0, 170, 255, 0.2),
        0 4px 16px rgba(0, 0, 0, 0.4);
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
}

.icon-box::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, transparent, rgba(0, 234, 255, 0.3), transparent);
    opacity: 0;
    transition: opacity 0.4s;
}

.icon-item:hover .icon-box {
    transform: translateY(-4px) scale(1.05);
    border-color: rgba(0, 234, 255, 0.8);
    box-shadow: 
        inset 0 0 30px rgba(0, 234, 255, 0.2),
        0 0 30px rgba(0, 234, 255, 0.5),
        0 0 50px rgba(0, 170, 255, 0.3);
}

.icon-item:hover .icon-box::before {
    opacity: 1;
}

.icon-box svg {
    width: 30px;
    height: 30px;
    stroke: #00eaff;
    stroke-width: 1.5;
    fill: none;
    filter: drop-shadow(0 0 6px #00aaff);
    transition: all 0.3s;
}

.icon-item:hover .icon-box svg {
    stroke: #ffffff;
    filter: drop-shadow(0 0 10px #00eaff);
}

.icon-label {
    font-size: 11.5px;
    font-weight: 500;
    color: #d0e4f5;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: center;
    text-shadow: 0 0 10px rgba(0, 234, 255, 0.5);
    white-space: nowrap;
}

.octagon-frame {
    position: relative;
    width: min(380px, 82vw);
    aspect-ratio: 1;
    margin: 0 auto;
}

.frame-glow {
    position: absolute;
    inset: -20px;
    background: radial-gradient(circle, rgba(0, 234, 255, 0.3) 0%, transparent 70%);
    filter: blur(20px);
    animation: pulseGlow 3s ease-in-out infinite;
    z-index: 0;
}

@keyframes pulseGlow {
    0%, 100% { opacity: 0.6; transform: scale(0.95); }
    50% { opacity: 1; transform: scale(1.05); }
}

.octagon {
    position: absolute;
    inset: 0;
    clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
    background: linear-gradient(135deg, #001a33 0%, #003366 100%);
    padding: 3px;
    box-shadow: 
        0 0 40px rgba(0, 234, 255, 0.5),
        inset 0 0 40px rgba(0, 234, 255, 0.2);
    animation: framePulse 3s ease-in-out infinite;
    z-index: 2;
}

@keyframes framePulse {
    0%, 100% { 
        box-shadow: 0 0 30px rgba(0, 234, 255, 0.4), inset 0 0 30px rgba(0, 234, 255, 0.15);
    }
    50% { 
        box-shadow: 0 0 60px rgba(0, 234, 255, 0.8), 0 0 90px rgba(0, 170, 255, 0.4), inset 0 0 40px rgba(0, 234, 255, 0.3);
    }
}

.octagon-inner {
    width: 100%;
    height: 100%;
    clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
    background: #020c1b;
    overflow: hidden;
    position: relative;
}

.portrait-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
}

.cyan-sky {
    position: absolute;
    inset: -10%;
    background: 
        radial-gradient(ellipse at center top, #00eaff 0%, #00b8d4 25%, #0088aa 50%, #004466 75%, #001a2a 100%);
    opacity: 0.95;
    z-index: 1;
}

.portrait-halo {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140%;
    height: 140%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(0, 234, 255, 0.4) 0%, rgba(0, 170, 255, 0.2) 30%, transparent 70%);
    filter: blur(20px);
    animation: haloPulse 4s ease-in-out infinite;
    z-index: 2;
}

@keyframes haloPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.7; }
    50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
}

#portrait {
    position: absolute;
    left: 50%;
    top: 44%;
    width: 118%;
    height: 118%;
    object-fit: cover;
    object-position: 50% 22%;
    transform: translate(-50%, -50%);
    z-index: 3;
    filter: contrast(1.08) brightness(1.04) saturate(1.1);
    animation: portraitZoom 6s ease-in-out infinite alternate;
}

@keyframes portraitZoom {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.03); }
}

.corner {
    position: absolute;
    width: 36px;
    height: 36px;
    border: 3px solid #00eaff;
    z-index: 5;
    filter: drop-shadow(0 0 8px #00eaff);
}

.corner-tl { top: -6px; left: 21%; border-right: none; border-bottom: none; }
.corner-tr { top: -6px; right: 21%; border-left: none; border-bottom: none; }
.corner-bl { bottom: -6px; left: 21%; border-right: none; border-top: none; }
.corner-br { bottom: -6px; right: 21%; border-left: none; border-top: none; }

.corner-tl-out { top: 21%; left: -6px; border-right: none; border-bottom: none; transform: rotate(-45deg); transform-origin: top left; }
.corner-tr-out { top: 21%; right: -6px; border-left: none; border-bottom: none; transform: rotate(45deg); transform-origin: top right; }
.corner-bl-out { bottom: 21%; left: -6px; border-right: none; border-top: none; transform: rotate(45deg); transform-origin: bottom left; }
.corner-br-out { bottom: 21%; right: -6px; border-left: none; border-top: none; transform: rotate(-45deg); transform-origin: bottom right; }

.cta-wrap {
    margin-top: 70px;
    text-align: center;
}

.cta {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffffff;
    background: rgba(0, 30, 60, 0.4);
    border: 1.5px solid #00eaff;
    padding: 18px 44px;
    border-radius: 50px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 
        inset 0 0 24px rgba(0, 234, 255, 0.15),
        0 0 24px rgba(0, 170, 255, 0.25),
        0 8px 24px rgba(0, 0, 0, 0.4);
    transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0, 234, 255, 0.3), transparent);
    transform: translateX(-100%);
    transition: transform 0.8s;
}

.cta:hover {
    transform: translateY(-3px);
    border-color: #ffffff;
    box-shadow: 
        inset 0 0 30px rgba(0, 234, 255, 0.25),
        0 0 40px rgba(0, 234, 255, 0.6),
        0 0 80px rgba(0, 170, 255, 0.4),
        0 12px 30px rgba(0, 0, 0, 0.5);
    text-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
}

.cta:hover::before {
    transform: translateX(100%);
}

.cta:active {
    transform: translateY(-1px);
}

footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(1, 8, 18, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid rgba(0, 234, 255, 0.12);
    padding: 12px 5%;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    gap: 20px;
    z-index: 50;
    flex-wrap: wrap;
}

.footer-item {
    display: flex;
    align-items: center;
    gap: 7px;
    color: #5e7a92;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.3px;
    transition: color 0.3s;
}

.footer-item:hover {
    color: #8fb4d1;
}

.footer-item svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    opacity: 0.8;
}

/* Preload hidden */
.preload {
    position: absolute;
    width: 0;
    height: 0;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
}

/* Responsive */
@media (max-width: 1024px) {
    .center-stage {
        gap: 40px;
    }
    .side-icons {
        gap: 40px;
    }
    .icon-box {
        width: 58px;
        height: 58px;
    }
}

@media (max-width: 900px) {
    .nav-menu {
        position: absolute;
        top: 72px;
        left: 0;
        right: 0;
        background: rgba(2, 12, 27, 0.98);
        backdrop-filter: blur(20px);
        flex-direction: column;
        gap: 0;
        padding: 20px 0;
        border-bottom: 1px solid rgba(0, 234, 255, 0.15);
        transform: translateY(-120%);
        opacity: 0;
        pointer-events: none;
        transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    .nav-menu.open {
        transform: translateY(0);
        opacity: 1;
        pointer-events: all;
    }
    
    .nav-menu li {
        width: 100%;
        text-align: center;
    }
    
    .nav-menu a {
        display: block;
        padding: 14px;
    }
    
    .hamburger {
        display: flex;
    }
    
    .center-stage {
        grid-template-columns: 1fr;
        gap: 50px;
    }
    
    .side-icons {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 28px 36px;
        width: 100%;
    }
    
    .side-icons.left,
    .side-icons.right {
        justify-self: center;
        align-items: center;
    }
    
    .side-icons.left { order: 2; }
    .octagon-frame { order: 1; }
    .side-icons.right { order: 3; }
    
    .hero {
        padding: 130px 5% 120px;
    }
    
    .brand-large {
        margin-bottom: 40px;
    }
    
    .cta-wrap {
        margin-top: 50px;
    }
    
    footer {
        padding: 10px 3%;
        gap: 14px;
    }
    
    .footer-item span {
        display: none;
    }
    
    .footer-item svg {
        width: 18px;
        height: 18px;
    }
}

@media (max-width: 480px) {
    .logo {
        font-size: 22px;
    }
    
    .hero h1 {
        font-size: 1.4rem;
        letter-spacing: 1px;
    }
    
    .octagon-frame {
        width: 78vw;
    }
    
    .icon-box {
        width: 54px;
        height: 54px;
    }
    
    .icon-box svg {
        width: 26px;
        height: 26px;
    }
    
    .icon-label {
        font-size: 10.5px;
    }
    
    .cta {
        padding: 15px 32px;
        font-size: 13px;
        letter-spacing: 1.5px;
    }
}
</style>
</head>
<body>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Typewriter
    const typeEl = document.getElementById('typewriter');
    const fullText = 'BUILDING THE FUTURE OF IT TECHNOLOGY';
    let i = 0;
    function type() {
        if (i <= fullText.length) {
            typeEl.textContent = fullText.slice(0, i);
            i++;
            setTimeout(type, 45);
        } else {
            typeEl.style.borderRight = 'none';
        }
    }
    setTimeout(type, 400);

    // Set portrait from preload
    const preload = document.getElementById('preload-main');
    const portrait = document.getElementById('portrait');
    if (preload && portrait) {
        if (preload.complete) {
            portrait.src = preload.src;
        } else {
            preload.onload = () => portrait.src = preload.src;
        }
    }

    // Icon fade-in stagger
    document.querySelectorAll('.icon-item').forEach((item, idx) => {
        setTimeout(() => item.classList.add('visible'), 600 + idx * 200);
    });

    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('navMenu');
    hamburger.addEventListener('click', () => {
        navMenu.classList.toggle('open');
    });

    // Particles background
    const particlesContainer = document.getElementById('particles');
    for (let p = 0; p < 30; p++) {
        const dot = document.createElement('div');
        dot.className = 'particle';
        dot.style.left = Math.random() * 100 + '%';
        dot.style.animationDelay = Math.random() * 15 + 's';
        dot.style.animationDuration = (12 + Math.random() * 10) + 's';
        dot.style.opacity = 0.3 + Math.random() * 0.4;
        particlesContainer.appendChild(dot);
    }

    // Network canvas
    const canvas = document.getElementById('network');
    const ctx = canvas.getContext('2d');
    let width, height, nodes = [];
    
    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        nodes = [];
        const count = Math.floor(width * height / 18000);
        for (let n = 0; n < count; n++) {
            nodes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3
            });
        }
    }
    resize();
    window.addEventListener('resize', resize);

    function animateNetwork() {
        ctx.clearRect(0, 0, width, height);
        
        // Update and draw
        nodes.forEach(n => {
            n.x += n.vx;
            n.y += n.vy;
            if (n.x < 0 || n.x > width) n.vx *= -1;
            if (n.y < 0 || n.y > height) n.vy *= -1;
        });

        // Connections
        ctx.lineWidth = 0.6;
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const a = nodes[i], b = nodes[j];
                const dx = a.x - b.x, dy = a.y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    const opacity = 1 - dist / 120;
                    ctx.strokeStyle = `rgba(0, 200, 255, ${opacity * 0.25})`;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }
        }

        // Nodes
        nodes.forEach(n => {
            ctx.fillStyle = 'rgba(0, 234, 255, 0.6)';
            ctx.shadowColor = '#00eaff';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(n.x, n.y, 1.5, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.shadowBlur = 0;

        requestAnimationFrame(animateNetwork);
    }
    animateNetwork();

    // Parallax
    const skyline = document.querySelector('.skyline-img');
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20;
        const y = (e.clientY / window.innerHeight - 0.5) * 10;
        canvas.style.transform = `translate(${x}px, ${y}px)`;
        if (skyline) {
            skyline.style.transform = `translateX(calc(-50% + ${x * 0.8}px)) translateY(${y * 0.5}px)`;
        }
    });

    // CTA hover sound effect (visual only)
    document.querySelector('.cta').addEventListener('click', () => {
        document.querySelector('.octagon-frame').style.animation = 'none';
        setTimeout(() => {
            document.querySelector('.octagon-frame').style.animation = '';
        }, 10);
    });
});
</script>
