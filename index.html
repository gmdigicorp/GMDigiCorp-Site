<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GMDigiCorp</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000814;
overflow:hidden;
color:white;
position:relative;
}

/* WATERMARK BACKGROUND */

body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:url('./69406.png') center center no-repeat;
background-size:500px;

opacity:0.05;

filter:blur(3px);

z-index:-2;
}

/* BLUE GLOW */

body::after{
content:'';
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:900px;
height:900px;
background:radial-gradient(circle,
rgba(0,140,255,0.20),
transparent 70%);
filter:blur(100px);
z-index:-1;
}

/* MAIN SECTION */

.hero{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* CONTAINER */

.container{
position:relative;
z-index:2;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
}

/* PROFILE IMAGE */

.profile{
width:220px;
height:220px;
border-radius:50%;
overflow:hidden;
border:5px solid #00aaff;

box-shadow:
0 0 20px #00aaff,
0 0 50px rgba(0,140,255,0.6);

background:#000;

margin-bottom:-40px;

z-index:10;

animation:float 4s ease-in-out infinite;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

/* LOGO */

.logo{
width:100%;
max-width:850px;

filter:
drop-shadow(0 0 20px #008cff)
drop-shadow(0 0 50px rgba(0,140,255,0.5));

animation:float2 5s ease-in-out infinite;
}

/* TAGLINE */

.tagline{
margin-top:35px;
font-size:26px;
font-weight:300;
letter-spacing:8px;
line-height:1.8;
color:#f5f5f5;
}

.highlight{
color:#00aaff;
font-weight:700;
}

/* COMING SOON */

.coming{
margin-top:30px;
font-size:65px;
font-weight:700;
letter-spacing:12px;

background:linear-gradient(to bottom,#ffffff,#bdbdbd);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px rgba(0,140,255,0.4),
0 0 35px rgba(0,140,255,0.6);
}

/* BUTTON */

.btn{
display:inline-block;

margin-top:45px;

padding:18px 55px;

border-radius:60px;

text-decoration:none;

font-size:22px;
font-weight:600;

color:white;

background:linear-gradient(90deg,#00aaff,#0044ff);

box-shadow:
0 0 20px rgba(0,140,255,0.5),
0 0 40px rgba(0,140,255,0.3);

transition:0.4s;
}

.btn:hover{
transform:scale(1.08);
}

/* FOOTER */

footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:15px;
color:#9ca3af;
}

/* ANIMATIONS */

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}

@keyframes float2{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(10px);
}

100%{
transform:translateY(0px);
}

}

/* MOBILE */

@media(max-width:768px){

.profile{
width:170px;
height:170px;
margin-bottom:-25px;
}

.logo{
max-width:100%;
}

.tagline{
font-size:18px;
letter-spacing:4px;
}

.coming{
font-size:42px;
letter-spacing:6px;
}

.btn{
font-size:18px;
padding:15px 35px;
}

footer{
font-size:12px;
padding:0 10px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="container">

<!-- PROFILE PHOTO -->

<div class="profile">
<img src="./69406.png" alt="Founder">
</div>

<!-- LOGO -->

<img src="./69409.png" class="logo" alt="GMDigiCorp Logo">

<!-- TAGLINE -->

<div class="tagline">
DIGITAL <span class="highlight">REVOLUTION</span><br>
STARTS HERE
</div>

<!-- COMING SOON -->

<div class="coming">
COMING SOON
</div>

<!-- BUTTON -->

<a href="mailto:gmdigicorp@gmail.com" class="btn">
Contact Us
</a>

</div>

<footer>
© 2026 GMDigiCorp • Innovating the Digital Future
</footer>

</section>

</body>
</html>
