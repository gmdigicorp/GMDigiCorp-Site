<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GMDigiCorp</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
overflow:hidden;
color:#fff;
}

.hero{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:#000;
}

.hero::before{
content:'';
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,
rgba(0,140,255,0.25) 0%,
rgba(0,140,255,0.08) 40%,
transparent 70%);
filter:blur(80px);
}

.container{
position:relative;
z-index:2;
padding:20px;
animation:fadeIn 2s ease;
}

.logo{
width:100%;
max-width:900px;
display:block;
margin:auto;
filter:
drop-shadow(0 0 15px #008cff)
drop-shadow(0 0 40px rgba(0,140,255,0.5));
animation:float 5s ease-in-out infinite;
}

.tagline{
margin-top:40px;
font-size:28px;
letter-spacing:10px;
font-weight:300;
line-height:1.8;
color:#f5f5f5;
}

.highlight{
color:#00aaff;
font-weight:700;
}

.coming{
margin-top:35px;
font-size:70px;
font-weight:700;
letter-spacing:12px;
background:linear-gradient(to bottom,#ffffff,#c7c7c7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:
0 0 10px rgba(0,140,255,0.4),
0 0 30px rgba(0,140,255,0.5);
}

.btn{
display:inline-block;
margin-top:45px;
padding:18px 55px;
border-radius:60px;
text-decoration:none;
font-size:24px;
font-weight:600;
color:#fff;
background:linear-gradient(90deg,#00aaff,#003cff);
box-shadow:
0 0 20px rgba(0,140,255,0.5),
0 0 40px rgba(0,140,255,0.3);
transition:0.4s;
}

.btn:hover{
transform:scale(1.08);
}

footer{
position:absolute;
bottom:25px;
width:100%;
text-align:center;
font-size:16px;
color:#9ca3af;
}

@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0px);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){

.logo{
max-width:95%;
}

.tagline{
font-size:18px;
letter-spacing:5px;
}

.coming{
font-size:42px;
letter-spacing:6px;
}

.btn{
font-size:18px;
padding:15px 40px;
}

footer{
font-size:13px;
padding:0 10px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="container">

<img src="./69409.png" class="logo" alt="GMDigiCorp Logo">

<div class="tagline">
DIGITAL <span class="highlight">REVOLUTION</span><br>
STARTS HERE
</div>

<div class="coming">
COMING SOON
</div>

<a href="mailto:gmdigicorp@gmail.com" class="btn">
Contact Us
</a>

</div>

<footer>
© 2026 GMDigiCorp • Innovating the Digital Future
</footer>

</section>

</body>
</html>
